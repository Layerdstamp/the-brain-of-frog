<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="The Brain of Frog: an interactive neural universe scene built with Three.js."
    />
    <title>The Brain of Frog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <section class="scene-shell">
        <canvas id="scene"></canvas>
        <div class="top-title" aria-hidden="true">Mind of Frog</div>
        <div id="node-info" aria-live="polite" class="node-info hidden"></div>
      </section>
      <div class="scroll-zones" aria-hidden="true">
        <section class="scroll-zone"><span>Surface Hum</span></section>
        <section class="scroll-zone"><span>Cortex Drift</span></section>
        <section class="scroll-zone"><span>Signal Bloom</span></section>
        <section class="scroll-zone"><span>Myth Fringe</span></section>
        <section class="scroll-zone"><span>Memory Tunnels</span></section>
        <section class="scroll-zone"><span>Deep Thought Vault</span></section>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
